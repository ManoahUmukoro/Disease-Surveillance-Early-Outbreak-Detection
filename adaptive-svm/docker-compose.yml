# Full local stack for the Adaptive SVM surveillance system.
#
#   docker compose up --build      → dashboard at http://localhost:8501
#
# This is the Chapter 4 architecture running on a single machine: the same app code that runs on
# Streamlit Community Cloud, now wired to real MongoDB and Redis services instead of degrading.
#   • app       — the Streamlit dashboard (structured data → SQLite inside the container)
#   • consumer  — the Redis Streams processing loop (reacts to each registered case)
#   • mongo     — unstructured store (clinical notes, lab info, uploaded documents)
#   • redis     — ingestion bus (Redis Streams, the lightweight substitute for Kafka)
services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      MONGODB_URI: "mongodb://mongo:27017"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - mongo
      - redis

  consumer:
    build: .
    command: ["python", "scripts/stream_consumer.py"]
    environment:
      REDIS_URL: "redis://redis:6379"
      MONGODB_URI: "mongodb://mongo:27017"
    depends_on:
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
